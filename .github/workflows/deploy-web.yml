name: Deploy Web to GitHub Pages

on:
  push:
    branches: [claude/game-redesign-original-assets-1FjHj, main]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: phantom-crew
        run: flutter pub get

      - name: Run tests
        working-directory: phantom-crew
        run: flutter test

      - name: Build web (CanvasKit for best game performance)
        working-directory: phantom-crew
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --base-href "/phantom-crew/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: phantom-crew/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
