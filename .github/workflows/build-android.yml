name: Build Android APK

on:
  push:
    branches: [claude/game-redesign-original-assets-1FjHj, main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: phantom-crew
        run: flutter pub get

      - name: Run tests
        working-directory: phantom-crew
        run: flutter test

      - name: Build APK (debug)
        working-directory: phantom-crew
        run: flutter build apk --debug

      - name: Build APK (release)
        working-directory: phantom-crew
        run: flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomCrew-Android-debug-${{ github.run_number }}
          path: phantom-crew/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: PhantomCrew-Android-release-${{ github.run_number }}
          path: phantom-crew/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
